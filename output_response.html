<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Roadmap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f8fafc;
        }
        /* Styling the AI generated content */
        #roadmap-container h1 { font-size: 2.25rem; font-weight: 800; color: #1e293b; margin-bottom: 1.5rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; }
        #roadmap-container h2 { font-size: 1.5rem; font-weight: 700; color: #4f46e5; margin-top: 2.5rem; margin-bottom: 1rem; display: flex; align-items: center; }
        #roadmap-container p { color: #475569; line-height: 1.8; margin-bottom: 1rem; }

        /* Table Styling */
        #roadmap-container table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        #roadmap-container th { background: #f1f5f9; padding: 12px 15px; text-align: left; font-weight: 600; color: #334155; border-bottom: 1px solid #e2e8f0; }
        #roadmap-container td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; color: #64748b; font-size: 0.95rem; }
        #roadmap-container tr:last-child td { border-bottom: none; }
        #roadmap-container tr:hover td { background-color: #f8fafc; }

        /* List Styling */
        #roadmap-container ul { margin-bottom: 1.5rem; list-style: none; padding-left: 0; }
        #roadmap-container li { position: relative; padding-left: 1.5rem; margin-bottom: 0.75rem; color: #475569; }
        #roadmap-container li::before { content: "→"; position: absolute; left: 0; color: #6366f1; font-weight: bold; }

        /* Modern Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <span class="text-indigo-600 font-bold tracking-widest uppercase text-xs">Preparation Module</span>
                <h2 class="text-3xl font-extrabold text-slate-900">Career Roadmap</h2>
            </div>
            <a href="/">
                <button class="group flex items-center gap-2 bg-white border border-slate-200 px-6 py-3 rounded-xl font-semibold text-slate-700 hover:bg-slate-50 hover:border-indigo-300 transition-all shadow-sm">
                    <svg class="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Try Another Role
                </button>
            </a>
        </div>

        <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/60 border border-slate-100 p-8 md:p-16">
            <div id="roadmap-container">
                <div class="flex justify-center py-10" id="loader">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
                </div>
            </div>
        </div>

        <footer class="mt-10 text-center text-slate-400 text-sm">
            Generated by AI Interview Coach &bull; 2026
        </footer>
    </div>

    <script>
        // 1. Get the raw text from your backend variable
        // We wrap it in backticks so JavaScript treats it as a string
        const rawMarkdown = `{{ai | safe}}`;

        // 2. Convert Markdown to HTML using Marked.js
        const htmlContent = marked.parse(rawMarkdown);

        // 3. Inject it into the page
        document.getElementById('roadmap-container').innerHTML = htmlContent;
    </script>
</body>
</html>
