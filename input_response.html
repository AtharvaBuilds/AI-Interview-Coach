<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Prep | Set Your Path</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top left, #f8fafc, #e2e8f0); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        <div class="bg-indigo-600 p-8 text-white text-center">
            <h1 class="text-2xl font-bold italic tracking-tight">AI Interview Coach</h1>
            <p class="text-indigo-100 text-sm mt-2">Personalize your interview roadmap</p>
        </div>

        <form method="post" class="p-8 space-y-6">
            <div>
                <label for="role" class="block text-sm font-semibold text-slate-700 mb-2">Target Role</label>
                <input type="text" id="role" name="role" placeholder="e.g. Full Stack Developer"
                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>

            <div>
                <label for="language" class="block text-sm font-semibold text-slate-700 mb-2">Preferred Language</label>
                <input type="text" id="language" name="language" placeholder="e.g. Java, Python, C++"
                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>

            <div>
                <label for="exp" class="block text-sm font-semibold text-slate-700 mb-2">Experience (Years)</label>
                <input type="number" id="exp" name="exp" min="0" placeholder="e.g. 2"
                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg shadow-indigo-200 transition-all transform active:scale-[0.98]">
                GENERATE ROADMAP
            </button>
        </form>
    </div>

</body>
</html>
